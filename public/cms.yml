backend:
  name: github
  repo: bbfans/bbfans.github.io
  branch: main
  base_url: https://bbfans-portal.jiechen2013.workers.dev
  auth_endpoint: /api/auth

# Decap's built-in Media Gallery is Git-backed. Use /admin/r2-media/
# for the bbfans-portal-images R2 bucket.
media_folder: "public/blog-images"
public_folder: "https://img.1001020.xyz"

collections:
  - name: "blog"
    label: "Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    summary: "{{title}} — {{published}} / homepage: {{featured}}"
    fields:
      - label: "Title"
        name: title
        widget: string
        required: true
      - label: "Description"
        name: description
        widget: text
        required: true
      - label: "Publish Date"
        name: pubDate
        widget: datetime
        required: true
      - label: "Published"
        name: published
        widget: boolean
        default: true
      - label: "Show on homepage"
        name: featured
        widget: boolean
        default: false
      - label: "Tags"
        name: tags
        widget: list
        required: false
        default: []
      - label: "Hero Image URL"
        name: heroImage
        widget: string
        required: false
        hint: "Open R2 Media, upload/select an image from bbfans-portal-images, then paste the copied https://img.1001020.xyz/blog-images/... URL here."
      - label: "Body"
        name: body
        widget: markdown
        required: true

  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{published}} / homepage: {{highlight}}"
    fields:
      - label: "Title"
        name: title
        widget: string
        required: true
      - label: "Description"
        name: description
        widget: text
        required: true
      - label: "Status"
        name: status
        widget: select
        options:
          - "active"
          - "shipping"
          - "deprecated"
        default: "active"
      - label: "Show on homepage"
        name: highlight
        widget: boolean
        default: false
      - label: "Published"
        name: published
        widget: boolean
        default: true
      - label: "URL"
        name: url
        widget: string
        required: false
      - label: "Repo"
        name: repo
        widget: string
        required: false
      - label: "Tags"
        name: tags
        widget: list
        required: false
        default: []
      - label: "Hero Image URL"
        name: heroImage
        widget: string
        required: false
        hint: "Open R2 Media, upload/select an image from bbfans-portal-images, then paste the copied https://img.1001020.xyz/blog-images/... URL here."
      - label: "Publish Date"
        name: pubDate
        widget: datetime
        required: false
      - label: "Body"
        name: body
        widget: markdown
        required: true

  - name: "changelog"
    label: "Changelog"
    folder: "src/content/changelog"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    summary: "{{title}} — {{published}}"
    fields:
      - label: "Title"
        name: title
        widget: string
        required: true
      - label: "Description"
        name: description
        widget: text
        required: true
      - label: "Publish Date"
        name: pubDate
        widget: datetime
        required: true
      - label: "Change Type"
        name: changeType
        widget: select
        options:
          - "new"
          - "update"
          - "deprecated"
        default: "new"
      - label: "Project"
        name: project
        widget: string
        required: false
      - label: "Repo"
        name: repo
        widget: string
        required: false
      - label: "Published"
        name: published
        widget: boolean
        default: true
      - label: "Body"
        name: body
        widget: markdown
        required: true
